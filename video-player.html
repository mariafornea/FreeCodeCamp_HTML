<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working with the HTML Video Element</title>
</head>
<body>
  <h1>Working with the HTML Video Element</h1>
  <video
    width="640"
    loop
    controls
    muted
    poster="https://cdn.freecodecamp.org/curriculum/labs/past-event2.jpg"
  > <!--создаю само окно видео и дальше указываю несколько источников одного и того же видео, браузер воспользуется первым возможным и проигнорирует остальные-->
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
      type="video/mp4"
    > <!--самый распространенный формат с кодеком H.264. Корректно поддерживается всеми современными браузерами и устройствами-->
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/mapmethod.webm"
      type="video/webm"
    > <!-- формат, разработанный Google. Отличается высокой степенью сжатия и отличным качеством. Идеален для экономии трафика и «фоновых» видео -->
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/mapmethod.ogg"
      type="video/ogg"
    > <!--открытый формат, который исторически поддерживался некоторыми браузерами, но сегодня используется редко-->
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/mapmethod.mov"
      type="video/quicktime"
    > <!--Этот формат не так популярен, как MP4, но он может понадобиться для поддержки устаревших приложений.-->
  </video>
</body>
</html>
